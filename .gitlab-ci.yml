## ORBIT CI Pipeline — GitLab CI/CD
## Builds and pushes all service images to Harbor, then triggers ArgoCD sync

stages:
  - lint
  - test
  - build
  - scan
  - deploy-dev
  - deploy-prod

variables:
  HARBOR_REGISTRY: harbor.ai.adports.ae
  HARBOR_PROJECT: orbit
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # Injected by CI: HARBOR_ROBOT_USER, HARBOR_ROBOT_PASSWORD, ARGOCD_AUTH_TOKEN

# ── Templates ────────────────────────────────────────────────────────────────
.python-service: &python-service
  image: harbor.ai.adports.ae/orbit/python:3.12-slim
  before_script:
    - pip install poetry==1.8.3
    - poetry install --no-interaction

.docker-build: &docker-build
  image: harbor.ai.adports.ae/orbit/docker:26-dind
  services:
    - name: harbor.ai.adports.ae/orbit/docker:26-dind
      alias: docker
  before_script:
    - echo "$HARBOR_ROBOT_PASSWORD" | docker login $HARBOR_REGISTRY -u "$HARBOR_ROBOT_USER" --password-stdin

# ── Lint ─────────────────────────────────────────────────────────────────────
lint:python:
  stage: lint
  <<: *python-service
  script:
    - pip install ruff
    - ruff check src/ --select E,F,W --ignore E501
  rules:
    - changes:
        - "src/**/*.py"

lint:dotnet:
  stage: lint
  image: harbor.ai.adports.ae/orbit/dotnet-sdk:9.0
  script:
    - cd src/portal-api && dotnet format --verify-no-changes
  rules:
    - changes:
        - "src/portal-api/**"

lint:angular:
  stage: lint
  image: harbor.ai.adports.ae/orbit/node:22-alpine
  script:
    - cd src/portal-ui && npm ci && npx nx lint portal
  rules:
    - changes:
        - "src/portal-ui/**"

# ── Test ─────────────────────────────────────────────────────────────────────
test:pipeline-ledger:
  stage: test
  <<: *python-service
  script:
    - cd src/pipeline-ledger && poetry run pytest tests/ -v --tb=short
  rules:
    - changes:
        - "src/pipeline-ledger/**"

test:portal-api:
  stage: test
  image: harbor.ai.adports.ae/orbit/dotnet-sdk:9.0
  script:
    - cd src/portal-api && dotnet test --logger "console;verbosity=normal"
  rules:
    - changes:
        - "src/portal-api/**"

test:portal-ui:
  stage: test
  image: harbor.ai.adports.ae/orbit/node:22-alpine
  script:
    - cd src/portal-ui && npm ci && npx nx test portal --watch=false --browsers=ChromeHeadless
  rules:
    - changes:
        - "src/portal-ui/**"

# ── Build ─────────────────────────────────────────────────────────────────────
.build-service:
  stage: build
  <<: *docker-build
  script:
    - |
      IMAGE_TAG="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${SERVICE_NAME}:${CI_COMMIT_SHA}"
      IMAGE_LATEST="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${SERVICE_NAME}:latest"
      docker build -t "$IMAGE_TAG" -t "$IMAGE_LATEST" -f "src/${SERVICE_NAME}/Dockerfile" "src/${SERVICE_NAME}/"
      docker push "$IMAGE_TAG"
      docker push "$IMAGE_LATEST"
      echo "IMAGE_TAG=${IMAGE_TAG}" >> build.env
  artifacts:
    reports:
      dotenv: build.env

build:portal-api:
  extends: .build-service
  variables:
    SERVICE_NAME: portal-api
  rules:
    - changes: ["src/portal-api/**"]

build:portal-ui:
