# Test jobs for phase 11-25 agents
test:specialist-agents:
  stage: test
  <<: *python-service
  script:
    - |
      FAILED=0
      for svc in architecture-agent backend-specialist-agent frontend-specialist-agent \
                 database-agent devops-agent qa-agent integration-test-agent \
                 guardrails-engine project-registry service-health-monitor ticket-agent; do
        echo "Testing $svc..."
        cd "src/$svc" && poetry install --no-interaction && poetry run pytest tests/ -v --tb=short || FAILED=1
        cd ../..
      done
      exit $FAILED
  rules:
    - changes:
        - "src/architecture-agent/**"
        - "src/backend-specialist-agent/**"
        - "src/frontend-specialist-agent/**"
        - "src/database-agent/**"
        - "src/devops-agent/**"
        - "src/qa-agent/**"
        - "src/integration-test-agent/**"
        - "src/guardrails-engine/**"
        - "src/project-registry/**"
        - "src/service-health-monitor/**"
        - "src/ticket-agent/**"

# Build all MCP servers using ARG-based Dockerfile
build:mcp-servers:
  stage: build
  <<: *docker-build
  script:
    - |
      for SERVER in registry keycloak-mcp gitlab-mcp kubernetes-mcp postgres-mcp jira-mcp vault-mcp harbor-mcp confluence-mcp; do
        IMAGE_TAG="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${SERVER}:${CI_COMMIT_SHA}"
        docker build --build-arg SERVER="$SERVER" -t "$IMAGE_TAG" -t "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${SERVER}:latest" src/mcp-servers/
        docker push "$IMAGE_TAG"
        docker push "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${SERVER}:latest"
      done
  rules:
    - changes: ["src/mcp-servers/**"]

# ── Scan ─────────────────────────────────────────────────────────────────────
scan:trivy:
  stage: scan
  image: harbor.ai.adports.ae/orbit/trivy:latest
  script:
    - |
      FAILED=0
      for SERVICE in portal-api portal-ui pipeline-ledger orchestrator hook-engine; do
        trivy image --exit-code 1 --severity CRITICAL \
          "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${SERVICE}:${CI_COMMIT_SHA}" || FAILED=1
      done
      exit $FAILED
  allow_failure: true  # Don't block on scan; alert via Grafana instead
  needs:
    - build:portal-api
    - build:portal-ui
    - build:pipeline-ledger
    - build:orchestrator
    - build:hook-engine

# ── Deploy Dev ───────────────────────────────────────────────────────────────
deploy:dev:
  stage: deploy-dev
  image: harbor.ai.adports.ae/orbit/argocd-cli:2.12.0
  script:
    - argocd login argocd.ai.adports.ae --auth-token "$ARGOCD_AUTH_TOKEN" --grpc-web
    - |
      for app in $(argocd app list -o name | grep "^orbit-"); do
        argocd app sync "$app" --timeout 120 || true
      done
  environment:
    name: dev
    url: https://portal.ai.adports.ae
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: on_success

# ── Deploy Prod ───────────────────────────────────────────────────────────────
deploy:prod:
  stage: deploy-prod
  image: harbor.ai.adports.ae/orbit/argocd-cli:2.12.0
  script:
    - argocd login argocd.ai.adports.ae --auth-token "$ARGOCD_AUTH_TOKEN" --grpc-web
    - |
      for app in $(argocd app list -o name | grep "^orbit-"); do
        argocd app sync "$app" --timeout 180 || true
      done
  environment:
    name: production
    url: https://portal.ai.adports.ae
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual  # Require manual approval for production
