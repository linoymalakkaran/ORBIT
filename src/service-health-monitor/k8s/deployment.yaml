apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-health-monitor
  namespace: ai-portal
  labels:
    app: service-health-monitor
    orbit.adports.ae/component: platform
    orbit.adports.ae/phase: "20"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-health-monitor
  template:
    metadata:
      labels:
        app: service-health-monitor
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "service-health-monitor"
        vault.hashicorp.com/agent-inject-secret-litellm: "secret/data/service-health-monitor/litellm"
        vault.hashicorp.com/agent-inject-template-litellm: |
          {{- with secret "secret/data/service-health-monitor/litellm" -}}
          export HEALTHMON_LITELLM_API_KEY="{{ .Data.data.api_key }}"
          {{- end }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: service-health-monitor
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: service-health-monitor
          image: harbor.ai.adports.ae/orbit/service-health-monitor:latest
          ports:
            - containerPort: 8080
          env:
            - name: HEALTHMON_PROMETHEUS_URL
              value: "http://prometheus-operated.monitoring.svc:9090"
            - name: HEALTHMON_LOKI_URL
              value: "http://loki.monitoring.svc:3100"
            - name: HEALTHMON_REGISTRY_URL
              value: "http://project-registry.ai-portal.svc:80"
            - name: HEALTHMON_ORCHESTRATOR_URL
              value: "http://orchestrator.ai-portal.svc:80"
            - name: HEALTHMON_LEDGER_URL
              value: "http://pipeline-ledger.ai-portal.svc:80"
            - name: HEALTHMON_LITELLM_API_BASE
              value: "http://litellm-gateway.litellm.svc:4000"
            - name: HEALTHMON_DEFAULT_MODEL
              value: "gpt-4o-mini"
            - name: HEALTHMON_POLL_INTERVAL_SECONDS
              value: "60"
            - name: HEALTHMON_ANOMALY_THRESHOLD_P99_MS
              value: "2000"
            - name: HEALTHMON_ERROR_RATE_ALERT_PCT
              value: "5.0"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc:4317"
            - name: OTEL_SERVICE_NAME
              value: "service-health-monitor"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: service-health-monitor
  namespace: ai-portal
---
apiVersion: v1
kind: Service
metadata:
  name: service-health-monitor
  namespace: ai-portal
spec:
  selector:
    app: service-health-monitor
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: service-health-monitor
  namespace: ai-portal
  annotations:
    konghq.com/strip-path: "false"
    cert-manager.io/cluster-issuer: adports-internal-ca
spec:
  ingressClassName: kong
  tls:
    - hosts:
        - health-monitor.ai.adports.ae
      secretName: health-monitor-tls
  rules:
    - host: health-monitor.ai.adports.ae
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: service-health-monitor
                port:
                  number: 80
