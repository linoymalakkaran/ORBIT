apiVersion: apps/v1
kind: Deployment
metadata:
  name: qa-agent
  namespace: ai-portal
  labels:
    app: qa-agent
    orbit.adports.ae/component: agent
    orbit.adports.ae/phase: "16"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qa-agent
  template:
    metadata:
      labels:
        app: qa-agent
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "qa-agent"
        vault.hashicorp.com/agent-inject-secret-litellm: "secret/data/qa-agent/litellm"
        vault.hashicorp.com/agent-inject-template-litellm: |
          {{- with secret "secret/data/qa-agent/litellm" -}}
          export QA_LITELLM_API_KEY="{{ .Data.data.api_key }}"
          {{- end }}
    spec:
      serviceAccountName: qa-agent
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: qa-agent
          image: harbor.ai.adports.ae/orbit/qa-agent:latest
          ports:
            - containerPort: 8080
          env:
            - name: QA_LITELLM_API_BASE
              value: "http://litellm-gateway.litellm.svc:4000"
            - name: QA_DEFAULT_MODEL
              value: "gpt-4o"
            - name: QA_LEDGER_URL
              value: "http://pipeline-ledger.ai-portal.svc:80"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc:4317"
            - name: OTEL_SERVICE_NAME
              value: "qa-agent"
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "800m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: qa-agent
  namespace: ai-portal
---
apiVersion: v1
kind: Service
metadata:
  name: qa-agent
  namespace: ai-portal
spec:
  selector:
    app: qa-agent
  ports:
    - port: 80
      targetPort: 8080
