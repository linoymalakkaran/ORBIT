apiVersion: apps/v1
kind: Deployment
metadata:
  name: architecture-agent
  namespace: ai-portal
  labels:
    app: architecture-agent
    orbit.adports.ae/component: agent
    orbit.adports.ae/phase: "11"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: architecture-agent
  template:
    metadata:
      labels:
        app: architecture-agent
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "architecture-agent"
        vault.hashicorp.com/agent-inject-secret-litellm: "secret/data/architecture-agent/litellm"
        vault.hashicorp.com/agent-inject-template-litellm: |
          {{- with secret "secret/data/architecture-agent/litellm" -}}
          export ARCH_LITELLM_API_KEY="{{ .Data.data.api_key }}"
          {{- end }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: architecture-agent
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: architecture-agent
          image: harbor.ai.adports.ae/orbit/architecture-agent:latest
          ports:
            - containerPort: 8080
          env:
            - name: ARCH_LITELLM_API_BASE
              value: "http://litellm-gateway.litellm.svc:4000"
            - name: ARCH_DEFAULT_MODEL
              value: "gpt-4o"
            - name: ARCH_LEDGER_URL
              value: "http://pipeline-ledger.ai-portal.svc:80"
            - name: ARCH_MINIO_URL
              value: "http://minio.ai-portal-data.svc:9000"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc:4317"
            - name: OTEL_SERVICE_NAME
              value: "architecture-agent"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: architecture-agent
  namespace: ai-portal
---
apiVersion: v1
kind: Service
metadata:
  name: architecture-agent
  namespace: ai-portal
spec:
  selector:
    app: architecture-agent
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: architecture-agent
  namespace: ai-portal
  annotations:
    konghq.com/strip-path: "false"
    cert-manager.io/cluster-issuer: adports-internal-ca
spec:
  ingressClassName: kong
  tls:
    - hosts:
        - arch-agent.ai.adports.ae
      secretName: arch-agent-tls
  rules:
    - host: arch-agent.ai.adports.ae
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: architecture-agent
                port:
                  number: 80
