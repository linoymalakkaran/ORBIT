apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-registry-agent
  namespace: ai-portal
  labels: { app: project-registry-agent }
spec:
  replicas: 1
  selector:
    matchLabels: { app: project-registry-agent }
  template:
    metadata:
      labels: { app: project-registry-agent }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "project-registry-agent"
        vault.hashicorp.com/agent-inject-secret-env: "secret/data/project-registry-agent/env"
        vault.hashicorp.com/agent-inject-template-env: |
          {{- with secret "secret/data/project-registry-agent/env" -}}
          export REGISTRY_GITLAB_TOKEN="{{ .Data.data.gitlab_token }}"
          export REGISTRY_PORTAL_SERVICE_TOKEN="{{ .Data.data.portal_service_token }}"
          {{- end }}
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      serviceAccountName: project-registry-agent
      containers:
        - name: project-registry-agent
          image: harbor.ai.adports.ae/orbit/project-registry-agent:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args: ["source /vault/secrets/env && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"]
          ports: [{ containerPort: 8000 }]
          env:
            - name: REGISTRY_GITLAB_URL
              value: "https://gitlab.adports.ae"
            - name: REGISTRY_PORTAL_API_URL
              value: "http://portal-api.ai-portal.svc:80"
            - name: REGISTRY_KAFKA_BOOTSTRAP_SERVERS
              value: "orbit-kafka-kafka-bootstrap.kafka.svc:9092"
            - name: REGISTRY_OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc:4317"
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true }
          livenessProbe:
            httpGet: { path: /health/live, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /health/live, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
      imagePullSecrets: [{ name: harbor-pull-secret }]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: project-registry-agent
  namespace: ai-portal
---
apiVersion: v1
kind: Service
metadata:
  name: project-registry-agent
  namespace: ai-portal
spec:
  selector: { app: project-registry-agent }
  ports: [{ port: 80, targetPort: 8000 }]
