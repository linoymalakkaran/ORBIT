# Redis Cluster — dev (3 nodes, no replicas)
image:
  registry: harbor.ai.adports.ae
  repository: bitnami/redis-cluster
  tag: "7.2.6"
cluster:
  nodes: 3
  replicas: 0
redis:
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 250m, memory: 512Mi }
persistence:
  enabled: true
  size: 5Gi
metrics:
  enabled: true
