# Redis Cluster — prod (6 nodes: 3 masters + 3 replicas)
image:
  registry: harbor.ai.adports.ae
  repository: bitnami/redis-cluster
  tag: "7.2.6"
cluster:
  nodes: 6
  replicas: 1
redis:
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 500m, memory: 2Gi }
persistence:
  enabled: true
  size: 20Gi
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
podDisruptionBudget:
  create: true
  minAvailable: 4
