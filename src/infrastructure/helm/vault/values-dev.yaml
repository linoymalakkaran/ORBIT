# Vault — dev (standalone)
global:
  image: harbor.ai.adports.ae/hashicorp/vault:1.17.3

injector:
  image:
    repository: harbor.ai.adports.ae/hashicorp/vault-k8s
    tag: "1.4.2"
  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 250m, memory: 128Mi }

server:
  image:
    repository: harbor.ai.adports.ae/hashicorp/vault
    tag: "1.17.3"
  standalone:
    enabled: true
    config: |
      ui = true
      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "file" {
        path = "/vault/data"
      }
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  dataStorage:
    enabled: true
    size: 10Gi

ui:
  enabled: true
  serviceType: ClusterIP
