# MinIO — prod (distributed, 4 nodes)
image:
  repository: harbor.ai.adports.ae/minio/minio
  tag: "RELEASE.2024-10-02T17-50-41Z"
mode: distributed
replicas: 4
persistence:
  enabled: true
  size: 200Gi
resources:
  requests: { memory: 1Gi, cpu: 500m }
  limits:   { memory: 2Gi, cpu: 1 }
existingSecret: minio-root-creds
buckets:
  - name: ai-portal-pg-backups
    policy: none
    versioning: true
    objectlocking: true
  - name: ai-portal-artifacts
    policy: none
  - name: ai-portal-context-archive
    policy: none
metrics:
  serviceMonitor:
    enabled: true
    includeNode: true
