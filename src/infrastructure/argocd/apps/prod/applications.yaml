# ArgoCD Application manifests for the prod environment.
# These are watched by the orbit-infra app-of-apps Application.
---
# Postgres
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orbit-postgres-prod
  namespace: ai-portal-system
  labels: { project: orbit, env: prod }
  finalizers: ["resources-finalizer.argocd.argoproj.io"]
spec:
  project: orbit
  sources:
    - repoURL: https://cloudnative-pg.github.io/charts
      chart: cloudnative-pg
      targetRevision: "0.22.1"
      helm:
        valueFiles:
          - $values/src/infrastructure/helm/cloudnativepg/values-prod.yaml
    - repoURL: https://github.com/linoymalakkaran/ORBIT.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-portal-data
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: ["CreateNamespace=true"]
