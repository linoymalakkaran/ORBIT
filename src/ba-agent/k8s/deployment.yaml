apiVersion: apps/v1
kind: Deployment
metadata:
  name: ba-agent
  namespace: ai-portal
  labels: { app: ba-agent }
spec:
  replicas: 1
  selector:
    matchLabels: { app: ba-agent }
  template:
    metadata:
      labels: { app: ba-agent }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "ba-agent"
        vault.hashicorp.com/agent-inject-secret-env: "secret/data/ba-agent/env"
        vault.hashicorp.com/agent-inject-template-env: |
          {{- with secret "secret/data/ba-agent/env" -}}
          export BA_LITELLM_API_KEY="{{ .Data.data.litellm_api_key }}"
          {{- end }}
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      serviceAccountName: ba-agent
      containers:
        - name: ba-agent
          image: harbor.ai.adports.ae/orbit/ba-agent:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args: ["source /vault/secrets/env && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"]
          ports: [{ containerPort: 8000 }]
          env:
            - name: BA_LITELLM_API_BASE
              value: "http://litellm-gateway.litellm.svc:4000"
            - name: BA_DEFAULT_MODEL
              value: "gpt-4o-mini"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc:4317"
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          securityContext: { allowPrivilegeEscalation: false }
          livenessProbe:
            httpGet: { path: /health/live, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /health/live, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
      imagePullSecrets: [{ name: harbor-pull-secret }]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ba-agent
  namespace: ai-portal
---
apiVersion: v1
kind: Service
metadata:
  name: ba-agent
  namespace: ai-portal
spec:
  selector: { app: ba-agent }
  ports: [{ port: 80, targetPort: 8000 }]
