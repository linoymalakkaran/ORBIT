apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-cms-domain-pack
  namespace: ai-portal
  labels:
    app: crm-cms-domain-pack
    domain: crm-cms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crm-cms-domain-pack
  template:
    metadata:
      labels:
        app: crm-cms-domain-pack
        domain: crm-cms
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "crm-cms-domain-pack"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/crm-cms/config"
    spec:
      serviceAccountName: crm-cms-domain-pack
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: crm-cms-domain-pack
          image: harbor.ai.adports.ae/orbit/crm-cms-domain-pack:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DOMAIN_NAME
              value: crm-cms
            - name: DATA_CLASSIFICATION
              value: confidential
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: crm-cms-domain-pack
  namespace: ai-portal
spec:
  selector:
    app: crm-cms-domain-pack
  ports:
    - port: 80
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crm-cms-domain-pack
  namespace: ai-portal
