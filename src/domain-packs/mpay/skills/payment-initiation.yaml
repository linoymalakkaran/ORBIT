id: mpay-payment-initiation
name: Payment Initiation
domain: mpay
version: "1.0.0"
description: |
  Generates PCI-DSS v4.0 compliant payment initiation microservice including
  tokenisation, idempotency key enforcement, and CBUAE dual-approval workflow.
tags: [payment, pci-dss, tokenisation, idempotency]
compliance: [PCI-DSS-v4.0, UAE-CBUAE]
data_classification: restricted

inputs:
  - name: merchant_id
    type: string
    required: true
  - name: amount_fils
    type: integer
    description: Amount in Fils (smallest UAE currency unit)
    required: true
  - name: currency
    type: string
    enum: [AED, USD, EUR]
    default: AED
  - name: idempotency_key
    type: string
    description: UUID v4 client-supplied idempotency key
    required: true
  - name: payment_method_token
    type: string
    description: Vault-stored tokenised card reference — never raw PAN
    required: true

outputs:
  - name: payment_id
    type: string
  - name: status
    type: string
    enum: [PENDING, AUTHORISED, DECLINED, FAILED]
  - name: authorisation_code
    type: string

security_controls:
  - no_pan_in_logs: true
  - vault_tokenisation: true
  - idempotency_enforced: true
  - dual_approval_required: true      # CBUAE requirement for AED > 50,000
  - tls_minimum: "1.3"
  - field_level_encryption: [payment_method_token]

generated_artefacts:
  - type: csharp_service
    template: PaymentInitiationService
  - type: sql_migration
    template: mpay_payments_table
  - type: openapi_stub
    path: openapi/payment-initiation.yaml
