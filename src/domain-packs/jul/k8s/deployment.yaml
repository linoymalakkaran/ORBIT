apiVersion: apps/v1
kind: Deployment
metadata:
  name: jul-domain-pack
  namespace: ai-portal
  labels:
    app: jul-domain-pack
    domain: jul
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jul-domain-pack
  template:
    metadata:
      labels:
        app: jul-domain-pack
        domain: jul
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "jul-domain-pack"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/jul/config"
    spec:
      serviceAccountName: jul-domain-pack
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: jul-domain-pack
          image: harbor.ai.adports.ae/orbit/jul-domain-pack:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DOMAIN_NAME
              value: jul
            - name: DATA_CLASSIFICATION
              value: internal
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: jul-domain-pack
  namespace: ai-portal
spec:
  selector:
    app: jul-domain-pack
  ports:
    - port: 80
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jul-domain-pack
  namespace: ai-portal
