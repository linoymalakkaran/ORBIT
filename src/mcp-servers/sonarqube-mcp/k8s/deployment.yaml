apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube-mcp
  namespace: ai-portal
  labels:
    app: sonarqube-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube-mcp
  template:
    metadata:
      labels:
        app: sonarqube-mcp
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "sonarqube-mcp"
        vault.hashicorp.com/agent-inject-secret-env: "secret/data/orbit/sonarqube-mcp/config"
        vault.hashicorp.com/agent-inject-template-env: |
          {{- with secret "secret/data/orbit/sonarqube-mcp/config" -}}
          export SONAR_URL="{{ .Data.data.sonar_url }}"
          export SONAR_TOKEN="{{ .Data.data.sonar_token }}"
          {{- end }}
    spec:
      serviceAccountName: sonarqube-mcp
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: sonarqube-mcp
          image: harbor.ai.adports.ae/orbit/sonarqube-mcp:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args: ["source /vault/secrets/env && uvicorn main:app --host 0.0.0.0 --port 8080"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube-mcp
  namespace: ai-portal
spec:
  selector:
    app: sonarqube-mcp
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sonarqube-mcp
  namespace: ai-portal
  annotations:
    vault.hashicorp.com/role: sonarqube-mcp
