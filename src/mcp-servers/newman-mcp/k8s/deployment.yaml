apiVersion: apps/v1
kind: Deployment
metadata:
  name: newman-mcp
  namespace: ai-portal
  labels:
    app: newman-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: newman-mcp
  template:
    metadata:
      labels:
        app: newman-mcp
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "newman-mcp"
        vault.hashicorp.com/agent-inject-secret-env: "secret/data/orbit/newman-mcp/config"
        vault.hashicorp.com/agent-inject-template-env: |
          {{- with secret "secret/data/orbit/newman-mcp/config" -}}
          export LITELLM_URL="{{ .Data.data.litellm_url }}"
          export LITELLM_API_KEY="{{ .Data.data.litellm_api_key }}"
          export PORTAL_API_URL="{{ .Data.data.portal_api_url }}"
          {{- end }}
    spec:
      serviceAccountName: newman-mcp
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: newman-mcp
          # Node.js image with newman + Python for FastAPI
          image: harbor.ai.adports.ae/orbit/newman-mcp:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args: ["source /vault/secrets/env && uvicorn main:app --host 0.0.0.0 --port 8080"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet: { path: /health/live, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health/ready, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: newman-mcp
  namespace: ai-portal
spec:
  selector:
    app: newman-mcp
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: newman-mcp
  namespace: ai-portal
