---
# Kubernetes MCP
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp
  namespace: ai-portal
  labels: { app: kubernetes-mcp }
spec:
  replicas: 1
  selector:
    matchLabels: { app: kubernetes-mcp }
  template:
    metadata:
      labels: { app: kubernetes-mcp }
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "mcp-servers"
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 1000 }
      serviceAccountName: kubernetes-mcp-reader
      containers:
        - name: kubernetes-mcp
          image: harbor.ai.adports.ae/orbit/kubernetes-mcp:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
          securityContext: { allowPrivilegeEscalation: false }
          livenessProbe:
            httpGet: { path: /health/live, port: 8000 }
      imagePullSecrets: [{ name: harbor-pull-secret }]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-mcp-reader
  namespace: ai-portal
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-mcp-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "services", "nodes", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-mcp-reader
subjects:
  - kind: ServiceAccount
    name: kubernetes-mcp-reader
    namespace: ai-portal
roleRef:
  kind: ClusterRole
  name: kubernetes-mcp-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-mcp
  namespace: ai-portal
spec:
  selector: { app: kubernetes-mcp }
  ports: [{ port: 80, targetPort: 8000 }]
---
