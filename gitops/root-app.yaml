## ArgoCD App-of-Apps — ORBIT Platform
## Root Application: points to gitops/apps/ which contains all ApplicationSets
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orbit-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: orbit
  source:
    repoURL: https://github.com/linoymalakkaran/ORBIT.git
    targetRevision: main
    path: gitops/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
