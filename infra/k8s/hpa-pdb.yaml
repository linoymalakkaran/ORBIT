## HPA configurations for all ORBIT services
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orchestrator
  namespace: ai-portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orchestrator
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: portal-api
  namespace: ai-portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: portal-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pipeline-ledger
  namespace: ai-portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pipeline-ledger
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pr-review-agent
  namespace: ai-portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pr-review-agent
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hook-engine
  namespace: ai-portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hook-engine
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: orchestrator
  namespace: ai-portal
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: orchestrator }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: portal-api
  namespace: ai-portal
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: portal-api }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hook-engine
  namespace: ai-portal
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: hook-engine }
