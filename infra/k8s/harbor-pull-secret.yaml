## Harbor pull secret — must be created in each namespace before deploying
## Run: scripts/create-harbor-secrets.sh
##
## This is a TEMPLATE only — actual credentials come from Vault/CI
## Never store credentials in this file.

---
# Template for creating harbor-pull-secret in ai-portal namespace
# Usage: envsubst < infra/k8s/harbor-pull-secret.yaml | kubectl apply -f -
# Required env: HARBOR_ROBOT_USER, HARBOR_ROBOT_PASSWORD

# Create via kubectl (preferred):
# kubectl create secret docker-registry harbor-pull-secret \
#   --docker-server=harbor.ai.adports.ae \
#   --docker-username=$HARBOR_ROBOT_USER \
#   --docker-password=$HARBOR_ROBOT_PASSWORD \
#   -n ai-portal

# Create via script: scripts/create-harbor-secrets.sh
apiVersion: v1
kind: Secret
metadata:
  name: harbor-pull-secret
  namespace: ai-portal
  annotations:
    # Rotate annually — track in Vault: secret/harbor/robot-token
    orbit/secret-rotation: "annual"
type: kubernetes.io/dockerconfigjson
data:
  # PLACEHOLDER — populated by scripts/create-harbor-secrets.sh
  .dockerconfigjson: Cg==
