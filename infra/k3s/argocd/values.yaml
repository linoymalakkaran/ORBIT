## ArgoCD Helm values — k3s profile
## Chart: argo/argo-cd
## Changes from prod:
##   - images: Harbor → quay.io public
##   - replicas: 2 → 1
##   - resources: reduced
##   - UI exposed via NodePort (k3s ServiceLB also works)
##   - Keycloak OIDC: use your server IP or nip.io domain

global:
  image:
    repository: quay.io/argoproj/argocd
    tag: "v2.12.6"

server:
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 250m, memory: 256Mi }
  extraArgs: ["--insecure"]
  ## k3s: NodePort for browser access
  service:
    type: NodePort
    nodePort: 30080     # http://SERVER_IP:30080

repoServer:
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 250m, memory: 256Mi }

applicationSet:
  replicas: 1
  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 100m, memory: 128Mi }

controller:
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

dex:
  enabled: false

redis:
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 100m, memory: 128Mi }

configs:
  cm:
    ## k3s: Initially use local admin account — enable OIDC after Keycloak is up
    ## Uncomment oidc.config once Keycloak is running:
    # oidc.config: |
    #   name: Keycloak
    #   issuer: http://SERVER_IP:30180/realms/ai-portal
    #   clientID: argocd
    #   clientSecret: $oidc.keycloak.clientSecret
    #   requestedScopes: ["openid", "profile", "email", "groups"]
    admin.enabled: "true"
  params:
    server.insecure: "true"
  secret:
    ## argocd-initial-admin-secret is auto-generated; get it with:
    ## kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d
