## OpenTelemetry Collector Helm values — k3s profile
## Chart: open-telemetry/opentelemetry-collector

mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.101.0"

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  processors:
    batch:
      send_batch_size: 8192
      timeout: 5s
    memory_limiter:
      limit_mib: 256
      spike_limit_mib: 64
  exporters:
    prometheusremotewrite:
      endpoint: http://prometheus-operated.monitoring.svc:9090/api/v1/write
    otlp/tempo:
      endpoint: http://tempo.monitoring.svc:4317
      tls:
        insecure: true
    loki:
      endpoint: http://loki.monitoring.svc:3100/loki/api/v1/push
  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlp/tempo]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheusremotewrite]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [loki]

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
