## OpenFGA — k3s profile
## Changes from prod:
##   - image: Harbor → public openfga/openfga
##   - replicas: 2 → 1
##   - Vault injection removed → use K8s Secret (orbit-openfga-env)
##   - Service: ClusterIP (accessed via Kong IngressRoute or Traefik)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfga
  namespace: ai-portal
  labels: { app: openfga }
spec:
  replicas: 1
  selector:
    matchLabels: { app: openfga }
  template:
    metadata:
      labels: { app: openfga }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 1000 }
      serviceAccountName: portal-api
      containers:
        - name: openfga
          image: openfga/openfga:v1.5.3
          args: ["run"]
          ports:
            - containerPort: 8080  # HTTP
            - containerPort: 8081  # gRPC
            - containerPort: 2112  # metrics
          env:
            - name: OPENFGA_AUTHN_METHOD
              value: "none"          # k3s: disable OIDC auth initially
            - name: OPENFGA_DATASTORE_ENGINE
              value: "postgres"
            - name: OPENFGA_LOG_FORMAT
              value: "json"
            - name: OPENFGA_DATASTORE_URI
              valueFrom:
                secretKeyRef:
                  name: orbit-openfga-env
                  key: postgres_uri
            ## Enable OTEL if observability stack is deployed
            # - name: OTEL_EXPORTER_OTLP_ENDPOINT
            #   value: "http://otel-collector.monitoring.svc:4317"
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "250m", memory: "256Mi" }
          securityContext: { allowPrivilegeEscalation: false }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: portal-api
  namespace: ai-portal
---
apiVersion: v1
kind: Service
metadata:
  name: openfga
  namespace: ai-portal
spec:
  selector: { app: openfga }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 8081
      targetPort: 8081
