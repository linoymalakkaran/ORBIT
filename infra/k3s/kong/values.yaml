## Kong Ingress Controller Helm values — k3s profile
## Chart: kong/kong
## Changes from prod:
##   - images: Harbor → Docker Hub public
##   - MetalLB annotation removed (k3s uses built-in ServiceLB/Klipper)
##   - LoadBalancer type kept — k3s ServiceLB will assign the host IP
##   - resources: reduced

image:
  repository: kong
  tag: "3.8.0"

ingressController:
  image:
    repository: kong/kubernetes-ingress-controller
    tag: "3.3.1"
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 250m, memory: 256Mi }

proxy:
  ## k3s ServiceLB will bind this to your server's IP on ports 80/443
  type: LoadBalancer
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

env:
  database: "off"
  router_flavor: expressions
  proxy_stream_error_log: /dev/stderr
  ## k3s: Use server IP directly. Replace SERVER_IP below or use nip.io
  admin_gui_url: http://REPLACE_WITH_SERVER_IP/kong-admin
  admin_api_uri: http://REPLACE_WITH_SERVER_IP/kong-admin

admin:
  enabled: true
  type: ClusterIP
