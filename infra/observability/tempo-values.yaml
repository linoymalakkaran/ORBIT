## Tempo Helm values
## Chart: grafana/tempo

image:
  registry: harbor.ai.adports.ae
  repository: orbit/tempo
  tag: "2.5.0"

tempo:
  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo-traces
        endpoint: minio.ai-portal-data.svc:9000
        access_key: "${TEMPO_S3_ACCESS_KEY}"
        secret_key: "${TEMPO_S3_SECRET_KEY}"
        insecure: true
  retention: 720h

persistence:
  enabled: true
  storageClassName: vsphere-csi
  size: 10Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi
