## Loki Helm values
## Chart: grafana/loki

image:
  registry: harbor.ai.adports.ae
  repository: orbit/loki
  tag: "3.0.0"

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    s3:
      endpoint: http://minio.ai-portal-data.svc:9000
      bucketnames: loki-logs
      region: us-east-1
      access_key_id: "${LOKI_S3_ACCESS_KEY}"
      secret_access_key: "${LOKI_S3_SECRET_KEY}"
      s3forcepathstyle: true
  schema_config:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 720h  # 30 days
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32

singleBinary:
  replicas: 1
  persistence:
    storageClass: vsphere-csi
    size: 20Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
