# Sovereign AI — Self-hosted Llama 3.3 70B on GPU nodes
# Phase 25: Gate 4 Checkpoint — NESA UAE compliance + SOC-2 readiness

# ── GPU Node Pool Taint ───────────────────────────────────────────────────────
# Apply to vSphere GPU nodes (pre-provisioned with NVIDIA GPU Operator):
# kubectl taint nodes <gpu-node> nvidia.com/gpu=present:NoSchedule

---
# Namespace for sovereign AI workloads
apiVersion: v1
kind: Namespace
metadata:
  name: sovereign-ai
  labels:
    orbit.adports.ae/tier: sovereign
    pod-security.kubernetes.io/enforce: restricted

---
# Llama 3.3 70B inference server (via vLLM — replaces Ollama per G26)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-inference
  namespace: sovereign-ai
  labels:
    app: llama-inference
    orbit.adports.ae/phase: "25"
    orbit.adports.ae/inference-engine: vllm
spec:
  replicas: 1
  strategy:
    type: Recreate   # GPU workloads can only run on one node at a time
  selector:
    matchLabels:
      app: llama-inference
  template:
    metadata:
      labels:
        app: llama-inference
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "llama-inference"
    spec:
      serviceAccountName: llama-inference
      imagePullSecrets:
        - name: harbor-pull-secret
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        orbit.adports.ae/gpu: "true"
      containers:
        # G26: vLLM replaces Ollama — OpenAI-compatible API on port 8000
        - name: vllm
          image: harbor.ai.adports.ae/orbit/vllm-openai:v0.5.5
          command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - "--model"
            - "/models/llama3.3-70b"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--tensor-parallel-size"
            - "1"
            - "--max-model-len"
            - "32768"
            - "--served-model-name"
            - "llama3-70b-sovereign"
            - "--trust-remote-code"
          ports:
            - containerPort: 8000
              name: vllm
          env:
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: spawn
            - name: HF_HUB_OFFLINE
              value: "1"   # Air-gapped — models pre-loaded on PVC
          volumeMounts:
            - name: model-storage
              mountPath: /models
          resources:
            requests:
              cpu: "8000m"
              memory: "80Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "16000m"
              memory: "120Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120     # Model loading takes time
            periodSeconds: 30
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 60
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      initContainers:
        - name: verify-model
          image: harbor.ai.adports.ae/orbit/alpine:3.19
          command: ["sh", "-c", "test -d /models/llama3.3-70b && echo 'Model found' || (echo 'ERROR: model not found at /models/llama3.3-70b' && exit 1)"]
          volumeMounts:
            - name: model-storage
              mountPath: /models
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: llama-models-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llama-models-pvc
  namespace: sovereign-ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: vsphere-csi-sc
  resources:
    requests:
      storage: 200Gi      # Llama 70B Q4 ~42GB + headroom

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llama-inference
  namespace: sovereign-ai

---
apiVersion: v1
kind: Service
metadata:
  name: llama-inference
  namespace: sovereign-ai
  labels:
    app: llama-inference
spec:
  selector:
    app: llama-inference
  ports:
    - port: 8000
      targetPort: 8000
      name: vllm     # G26: was 11434/ollama
  type: ClusterIP

---
# LiteLLM proxy config to route classified workloads to sovereign Llama
# Patch the existing litellm ConfigMap to add sovereign model route
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-sovereign-models
  namespace: litellm
data:
  sovereign_models.yaml: |
    # Sovereign AI model routes for classified workloads
    # Added by Phase 25

    model_list:
      - model_name: llama3-70b-sovereign
        litellm_params:
          # G26: vLLM exposes OpenAI-compatible API — use openai/ provider prefix
          model: openai/llama3-70b-sovereign
          api_base: http://llama-inference.sovereign-ai.svc:8000/v1
          api_key: not-required   # vLLM does not require an API key by default
          timeout: 300
          stream_timeout: 600

    router_settings:
      routing_strategy: least-busy

    # Model access control — only sovereign-ai namespace can use this model
    # Enforced via guardrails-engine OPA policy

---
# NetworkPolicy: restrict llama-inference access to sovereign-ai namespace only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llama-inference-access
  namespace: sovereign-ai
spec:
  podSelector:
    matchLabels:
      app: llama-inference
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: litellm
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-portal
      ports:
        - port: 8000    # G26: vLLM port (was 11434 for Ollama)
  policyTypes:
    - Ingress
